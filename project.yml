name: Tarkus
options:
  bundleIdPrefix: com.artivisual
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: "YES"
    DEVELOPMENT_TEAM: "ZS56LL5S52"

packages:
  swift-markdown:
    url: https://github.com/swiftlang/swift-markdown
    from: "0.5.0"
  Highlightr:
    url: https://github.com/raspu/Highlightr
    from: "2.2.1"

targets:
  Tarkus:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - path: Tarkus
    dependencies:
      - package: swift-markdown
        product: Markdown
      - package: Highlightr
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.artivisual.Tarkus
        INFOPLIST_FILE: Tarkus/Info.plist
        GENERATE_INFOPLIST_FILE: false
        DEVELOPMENT_ASSET_PATHS: "\"Tarkus/Preview Content\""
        CODE_SIGN_STYLE: Automatic
    postCompileScripts:
      - name: "Replace macOS icon with full icns"
        script: |
          if [ "$PLATFORM_NAME" = "macosx" ]; then
            FULL_ICNS="$SRCROOT/Tarkus/Resources/AppIcon.icns"
            DEST="$BUILT_PRODUCTS_DIR/$CONTENTS_FOLDER_PATH/Resources/AppIcon.icns"
            if [ -f "$FULL_ICNS" ]; then
              cp "$FULL_ICNS" "$DEST"
            fi
          fi
    scheme:
      testTargets:
        - TarkusTests

  TarkusTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TarkusTests
    dependencies:
      - target: Tarkus
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.artivisual.TarkusTests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Tarkus.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Tarkus"
        BUNDLE_LOADER: "$(TEST_HOST)"
